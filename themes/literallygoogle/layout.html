<!doctype html>
<html lang="en" __THEME_ATTRS__ __RTL_SUPPORT__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="degoog is an alternative search engine aggregator."
    />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      title="degoog"
      href="/opensearch.xml"
    />
    <title>degoog</title>
    <script>
      (function () {
        var r = document.documentElement;
        var m = window.matchMedia("(prefers-color-scheme: dark)");
        var last = "";
        function apply() {
          var stored = localStorage.getItem("theme") || "";
          var next = stored === "light" ? "light"
                   : stored === "dark"  ? "dark"
                   : m.matches ? "dark" : "light";
          if (next !== last) {
            r.setAttribute("data-theme", next);
            last = next;
          }
        }
        apply();
        m.addEventListener("change", apply);
        window.addEventListener("storage", function (e) {
          if (e.key === "theme") apply();
        });
        setInterval(apply, 800);
      })();
    </script>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="/themes/fonts/google-sans/static/GoogleSans-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="stylesheet" href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__" />
    __THEME_CSS__ __PLUGIN_ASSETS__ __CUSTOM_CSS__
  </head>
  <body __BODY_CLASS__>
    __PAGE_CONTENT__
    __THEME_TEMPLATES__
    <script type="module" src="/public/app.js?v=__APP_VERSION__"></script>
  </body>
</html>

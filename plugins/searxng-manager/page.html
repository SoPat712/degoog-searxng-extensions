<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SearXNG Engine Manager</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;
    --text: #e0e0e0;
    --text2: #a0a0b0;
    --accent: #4ecca3;
    --accent2: #3ba88a;
    --border: #2a2a4a;
    --enabled: #4ecca3;
    --disabled: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; margin-bottom: 6px; color: var(--accent); }
  .subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 20px; }
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 16px;
    flex-wrap: wrap; align-items: center;
  }
  input[type="search"] {
    flex: 1; min-width: 200px; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text); font-size: 0.9rem;
  }
  input[type="search"]::placeholder { color: var(--text2); }
  select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text); font-size: 0.9rem;
  }
  .filter-btn {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 0.8rem;
  }
  .filter-btn.active { background: var(--bg3); color: var(--accent); border-color: var(--accent); }
  .stats { font-size: 0.8rem; color: var(--text2); margin-bottom: 12px; }
  .stats span { color: var(--accent); font-weight: 600; }
  .engine-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px;
  }
  .engine-card {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    transition: border-color 0.2s;
  }
  .engine-card:hover { border-color: var(--accent); }
  .engine-card.changed { border-color: #f39c12; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; inset: 0; background: var(--disabled);
    border-radius: 22px; cursor: pointer; transition: 0.2s;
  }
  .toggle .slider::before {
    content: ''; position: absolute; width: 16px; height: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s;
  }
  .toggle input:checked + .slider { background: var(--enabled); }
  .toggle input:checked + .slider::before { transform: translateX(18px); }
  .engine-info { flex: 1; min-width: 0; }
  .engine-name {
    font-size: 0.9rem; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .engine-meta {
    font-size: 0.75rem; color: var(--text2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .engine-shortcut {
    font-size: 0.7rem; color: var(--accent2);
    background: rgba(78, 204, 163, 0.1); padding: 1px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 20px; background: var(--bg2);
    border-top: 1px solid var(--border);
    display: none; align-items: center; justify-content: space-between; z-index: 100;
  }
  .actions.visible { display: flex; }
  .actions .change-count { color: #f39c12; font-weight: 600; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 6px;
    font-size: 0.9rem; cursor: pointer; font-weight: 500;
  }
  .btn-save { background: var(--accent); color: var(--bg); }
  .btn-save:hover { background: var(--accent2); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: var(--border); color: var(--text); margin-right: 8px; }
  .loading { text-align: center; padding: 60px; color: var(--text2); }
  .back-link {
    display: inline-block; color: var(--text2); text-decoration: none;
    margin-bottom: 16px; font-size: 0.85rem;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
  <a class="back-link" href="/settings.html">&larr; Back to Settings</a>
  <h1>SearXNG Engine Manager</h1>
  <p class="subtitle">Enable or disable search engines from the SearXNG backend (242+ sources)</p>

  <div id="content" class="loading">Loading engines...</div>

  <div id="actions" class="actions">
    <div>
      <span class="change-count" id="changeCount">0</span> changes pending
    </div>
    <div>
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn btn-save" id="saveBtn">Save &amp; Restart SearXNG</button>
    </div>
  </div>

<script>
(function() {
  "use strict";

  let engines = [];
  let originalState = {};
  let changes = {};
  let currentFilter = "all";
  let currentSearch = "";
  let showFilter = "all";

  const contentEl = document.getElementById("content");
  const actionsEl = document.getElementById("actions");
  const changeCountEl = document.getElementById("changeCount");
  const saveBtn = document.getElementById("saveBtn");
  const cancelBtn = document.getElementById("cancelBtn");

  cancelBtn.addEventListener("click", resetChanges);
  saveBtn.addEventListener("click", saveChanges);

  function escapeText(str) {
    const el = document.createElement("span");
    el.textContent = str;
    return el.textContent;
  }

  async function init() {
    try {
      const res = await fetch("/api/plugin/searxng-manager/engines");
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      engines = data.engines.sort(function(a, b) { return a.name.localeCompare(b.name); });
      engines.forEach(function(e) { originalState[e.name] = e.enabled; });
      render();
    } catch (err) {
      contentEl.textContent = "Error: " + err.message;
    }
  }

  function getCategories() {
    const cats = new Set();
    engines.forEach(function(e) { (e.categories || []).forEach(function(c) { cats.add(c); }); });
    return ["all"].concat(Array.from(cats).sort());
  }

  function getEffectiveEnabled(e) {
    return changes[e.name] !== undefined ? changes[e.name] : e.enabled;
  }

  function render() {
    const categories = getCategories();
    const filtered = engines.filter(function(e) {
      if (currentSearch && e.name.toLowerCase().indexOf(currentSearch.toLowerCase()) === -1) return false;
      if (currentFilter !== "all" && (e.categories || []).indexOf(currentFilter) === -1) return false;
      var isEnabled = getEffectiveEnabled(e);
      if (showFilter === "enabled" && !isEnabled) return false;
      if (showFilter === "disabled" && isEnabled) return false;
      return true;
    });

    var enabledCount = engines.filter(function(e) { return getEffectiveEnabled(e); }).length;

    // Clear and rebuild DOM
    while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);

    // Toolbar
    var toolbar = document.createElement("div");
    toolbar.className = "toolbar";

    var searchInput = document.createElement("input");
    searchInput.type = "search";
    searchInput.placeholder = "Search engines...";
    searchInput.value = currentSearch;
    searchInput.addEventListener("input", function() { currentSearch = this.value; render(); });
    toolbar.appendChild(searchInput);

    var catSelect = document.createElement("select");
    categories.forEach(function(c) {
      var opt = document.createElement("option");
      opt.value = c;
      var count = c === "all" ? engines.length : engines.filter(function(e) { return (e.categories||[]).indexOf(c) !== -1; }).length;
      opt.textContent = c + " (" + count + ")";
      if (c === currentFilter) opt.selected = true;
      catSelect.appendChild(opt);
    });
    catSelect.addEventListener("change", function() { currentFilter = this.value; render(); });
    toolbar.appendChild(catSelect);

    ["all", "enabled", "disabled"].forEach(function(f) {
      var btn = document.createElement("button");
      btn.className = "filter-btn" + (showFilter === f ? " active" : "");
      btn.textContent = f.charAt(0).toUpperCase() + f.slice(1);
      btn.addEventListener("click", function() { showFilter = f; render(); });
      toolbar.appendChild(btn);
    });

    contentEl.appendChild(toolbar);

    // Stats
    var stats = document.createElement("div");
    stats.className = "stats";
    var statsSpan = document.createElement("span");
    statsSpan.textContent = enabledCount;
    stats.appendChild(statsSpan);
    stats.appendChild(document.createTextNode(" / " + engines.length + " engines enabled \u00B7 Showing " + filtered.length + " engines"));
    contentEl.appendChild(stats);

    // Grid
    var grid = document.createElement("div");
    grid.className = "engine-grid";

    filtered.forEach(function(e) {
      var isEnabled = getEffectiveEnabled(e);
      var isChanged = changes[e.name] !== undefined;

      var card = document.createElement("div");
      card.className = "engine-card" + (isChanged ? " changed" : "");

      var label = document.createElement("label");
      label.className = "toggle";
      var checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = isEnabled;
      checkbox.addEventListener("change", function() { toggleEngine(e.name, this.checked); });
      var slider = document.createElement("span");
      slider.className = "slider";
      label.appendChild(checkbox);
      label.appendChild(slider);
      card.appendChild(label);

      var info = document.createElement("div");
      info.className = "engine-info";
      var nameDiv = document.createElement("div");
      nameDiv.className = "engine-name";
      nameDiv.textContent = e.name;
      var metaDiv = document.createElement("div");
      metaDiv.className = "engine-meta";
      metaDiv.textContent = (e.categories || []).join(", ");
      info.appendChild(nameDiv);
      info.appendChild(metaDiv);
      card.appendChild(info);

      if (e.shortcut) {
        var sc = document.createElement("span");
        sc.className = "engine-shortcut";
        sc.textContent = "!" + e.shortcut;
        card.appendChild(sc);
      }

      grid.appendChild(card);
    });

    contentEl.appendChild(grid);
    updateActions();
  }

  function toggleEngine(name, enabled) {
    if (enabled === originalState[name]) {
      delete changes[name];
    } else {
      changes[name] = enabled;
    }
    render();
  }

  function updateActions() {
    var count = Object.keys(changes).length;
    changeCountEl.textContent = String(count);
    if (count > 0) {
      actionsEl.classList.add("visible");
    } else {
      actionsEl.classList.remove("visible");
    }
  }

  function resetChanges() {
    changes = {};
    render();
  }

  async function saveChanges() {
    saveBtn.disabled = true;
    saveBtn.textContent = "Saving...";

    var payload = Object.entries(changes).map(function(entry) {
      return { name: entry[0], enabled: entry[1] };
    });

    try {
      var res = await fetch("/api/plugin/searxng-manager/toggle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ engines: payload }),
      });
      var data = await res.json();
      if (data.ok) {
        Object.entries(changes).forEach(function(entry) {
          originalState[entry[0]] = entry[1];
        });
        changes = {};
        saveBtn.textContent = "Saved! Restarting...";
        setTimeout(async function() {
          await init();
          saveBtn.textContent = "Save & Restart SearXNG";
          saveBtn.disabled = false;
        }, 3000);
      } else {
        throw new Error(data.error || "Unknown error");
      }
    } catch (err) {
      alert("Error: " + err.message);
      saveBtn.textContent = "Save & Restart SearXNG";
      saveBtn.disabled = false;
    }
  }

  init();
})();
</script>
</body>
</html>
